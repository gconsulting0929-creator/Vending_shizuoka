<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=640, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>熱中症（WBGT）モニタリングシステム</title>
  <link rel="stylesheet" href="style.css?v=20260715-titlefix1">
</head>
<body>
  <main id="monitor" class="monitor stage-caution">

    <section class="side left">
      <div class="side-head">熱中症（WBGT）</div>
      <div class="side-status js-status">注意</div>
      <div class="side-message js-message">体調に注意</div>
      <div class="side-card">
        <div class="pill">WBGT</div>
        <div class="side-value js-wbgt">23.0</div>
      </div>
    </section>

    <section class="center">
      <div class="center-head">
        <div class="title">熱中症（WBGT）モニタリングシステム</div>
        <div class="date-time">
          <div id="current-date" class="date">2026.07.16（木）</div>
          <div id="current-time" class="time">15:00</div>
        </div>
      </div>

      <div class="main-status js-status">注意</div>
      <div class="main-message js-message">体調に注意</div>
      <img id="status-icon" class="status-icon" src="images/caution.png" alt="注意">

      <div class="metric temp">
        <img src="images/temperature.png" alt="" class="metric-icon temp-icon">
        <div class="metric-label">温度</div>
        <div class="metric-value"><span id="temperature">26.0</span><small>℃</small></div>
      </div>

      <div class="metric hum">
        <img src="images/humidity.png" alt="" class="metric-icon">
        <div class="metric-label">湿度</div>
        <div class="metric-value"><span id="humidity">50</span><small>％</small></div>
      </div>

      <div class="metric wbgt">
        <div class="mini-pill">WBGT</div>
        <div class="metric-value centered js-wbgt">23.0</div>
      </div>

      <div class="metric upd">
        <img src="images/clock.png" alt="" class="metric-icon clock-icon">
        <div class="metric-label update-label">更新時刻</div>
        <div id="updated-time" class="metric-value update-value">15:00</div>
      </div>

      <div class="risk-scale">
        <div class="risk safe" data-stage="safe"><b>安全</b><span>21未満</span></div>
        <div class="risk caution active" data-stage="caution"><b>注意</b><span>21〜25</span></div>
        <div class="risk warning" data-stage="warning"><b>警戒</b><span>25〜28</span></div>
        <div class="risk severe" data-stage="severe"><b>厳重警戒</b><span>28〜31</span></div>
        <div class="risk danger" data-stage="danger"><b>危険</b><span>31以上</span></div>
      </div>
    </section>

    <section class="side right">
      <div class="side-head">熱中症（WBGT）</div>
      <div class="side-status js-status">注意</div>
      <div class="side-message js-message">体調に注意</div>
      <div class="side-card">
        <div class="pill">WBGT</div>
        <div class="side-value js-wbgt">23.0</div>
      </div>
    </section>

  </main>
  <script src="script.js?v=20260715-codefinal1"></script>
</body>
</html>
