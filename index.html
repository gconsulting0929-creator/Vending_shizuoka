<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=640, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>熱中症（WBGT）モニタリングシステム</title>
  <link rel="stylesheet" href="style.css?v=20260714-8">
</head>
<body>
  <main id="monitor" class="monitor stage-safe">

    <section class="side-panel side-left">
      <div class="side-header">熱中症（WBGT）</div>
      <div class="side-status js-status">安全</div>
      <div class="side-message js-message">適宜に水分補給</div>
      <div class="side-wbgt-card">
        <div class="wbgt-pill">WBGT</div>
        <div class="side-wbgt js-wbgt">21.0</div>
      </div>
    </section>

    <section class="center-panel">
      <header class="center-header">
        <div class="system-title">熱中症（WBGT）モニタリングシステム</div>
        <div class="clock-area">
          <div id="current-date" class="current-date">2026.07.16（金）</div>
          <div id="current-time" class="current-time">15:00</div>
        </div>
      </header>

      <div class="center-status js-status">安全</div>
      <div class="center-message js-message">適宜に水分補給</div>
      <img id="status-icon" class="status-icon" src="images/safe.png" alt="安全">

      <div class="data-card temperature-card">
        <img src="images/temperature.png" class="data-icon temperature-icon" alt="">
        <div class="data-label">温度</div>
        <div class="data-number"><span id="temperature">24.0</span><small>℃</small></div>
      </div>

      <div class="data-card humidity-card">
        <img src="images/humidity.png" class="data-icon" alt="">
        <div class="data-label">湿度</div>
        <div class="data-number"><span id="humidity">40</span><small>％</small></div>
      </div>

      <div class="data-card wbgt-center-card">
        <div class="wbgt-mini">WBGT</div>
        <div class="data-number full-width js-wbgt">21.0</div>
      </div>

      <div class="data-card update-card">
        <img src="images/clock.png" class="data-icon clock-icon" alt="">
        <div class="data-label update-label">更新時刻</div>
        <div id="updated-time" class="data-number update-number">15:00</div>
      </div>

      <div class="risk-scale">
        <div class="risk risk-safe active" data-stage="safe"><b>安全</b><span>21未満</span></div>
        <div class="risk risk-caution" data-stage="caution"><b>注意</b><span>21〜25</span></div>
        <div class="risk risk-warning" data-stage="warning"><b>警戒</b><span>25〜28</span></div>
        <div class="risk risk-severe" data-stage="severe"><b>厳重警戒</b><span>28〜31</span></div>
        <div class="risk risk-danger" data-stage="danger"><b>危険</b><span>31以上</span></div>
      </div>
    </section>

    <section class="side-panel side-right">
      <div class="side-header">熱中症（WBGT）</div>
      <div class="side-status js-status">安全</div>
      <div class="side-message js-message">適宜に水分補給</div>
      <div class="side-wbgt-card">
        <div class="wbgt-pill">WBGT</div>
        <div class="side-wbgt js-wbgt">21.0</div>
      </div>
    </section>

  </main>
  <script src="script.js?v=20260714-8"></script>
</body>
</html>
